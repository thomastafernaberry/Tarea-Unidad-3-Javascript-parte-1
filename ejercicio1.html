<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 1</title>
</head>

<body>
  <script>

    var num1 = prompt('Ingrese la distancia que recorrerá en metros')

    if (num1 <= 1000) {
      document.write('Te recomendamos ir a pie')
    } else if (num1 <= 10000) {
      document.write('Te recomendamos ir en bicicleta')
    } else if (num1 <= 30000) {
      document.write('Te recomendamos ir en colectivo')
    } else if (num1 <= 100000) {
      document.write('Te recomendamos ir en auto')
    } else if (num1 > 100000) {
      document.write('Te recomendamos ir en avión')
    } else {
      document.write('Ingrese un número en metros válido')
    }
  </script>
</body>

</html>
