<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 2</title>
</head>

<body>
  <script>

    var numeros = [prompt('Ingrese el primer número'), prompt('Ingrese el segundo número'), prompt('Ingrese el tercer número'), prompt('Ingrese el cuarto número')]

    if (numeros[0] >= numeros[1] && numeros[0] >= numeros[2] && numeros[0] > numeros[3]) {
      document.write('El número mayor es ' + numeros[0])
    } else if (numeros[1] >= numeros[0] && numeros[1] >= numeros[2] && numeros[1] > numeros[3]) {
      document.write('El número mayor es ' + numeros[1])
    } else if (numeros[2] >= numeros[0] && numeros[2] >= numeros[1] && numeros[2] > numeros[3]) {
      document.write('El número mayor es ' + numeros[2])
    } else {
      document.write('El número mayor es ' + numeros[3])
    }
  </script>
</body>

</html>
